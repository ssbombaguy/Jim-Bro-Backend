name: Check missed workouts

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call missed-workout job endpoint
        run: |
          curl -sS -X POST "${{ secrets.BACKEND_URL }}/jobs/check-missed-workouts" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n" -o /dev/stdout --fail-with-body
